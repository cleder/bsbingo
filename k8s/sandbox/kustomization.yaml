apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bsbingo-sandbox

resources:
  - ../base
  - certificate.yaml
  - ingress-route.yaml
  - postgres.cnpg.yaml
  - secrets.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/command
      value: ["gunicorn"]
    - op: replace
      path: /spec/template/spec/containers/0/args
      value: ["config.asgi:application", "-k", "uvicorn_worker.UvicornWorker", "--bind", "0.0.0.0:8000"]
    - op: add
      path: /spec/template/spec/imagePullSecrets
      value:
        - name: regcred
    - op: add
      path: /spec/template/spec/initContainers/0/env
      value:
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: postgres-app
              key: host
    - op: replace
      path: /spec/template/spec/initContainers/0/command
      value: ["sh", "-c", "until pg_isready -h $(POSTGRES_HOST); do echo waiting for postgres; sleep 2; done;"]
    - op: add
      path: /spec/template/spec/initContainers/1/env
      value:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-app
              key: uri
    - op: add
      path: /spec/template/spec/containers/0/env
      value:
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: postgres-app
              key: host
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-app
              key: uri
  target:
    kind: Deployment
    name: backend


configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
     - ENVIRONMENT="sandbox"
     - DJANGO_SETTINGS_MODULE="config.settings.production"
     - DJANGO_CSRF_TRUSTED_ORIGINS="https://sandbox.bs-bingo.app"
     - CORS_ALLOWED_ORIGINS="https://nextjs.bs-bingo.app,https://sandbox.bs-bingo.app"
     - CORS_ALLOW_CREDENTIALS=True
     - AWS_S3_CUSTOM_DOMAIN="sandbox.bs-bingo.app"

images:
  - name: backend
    newName: 000000000000.dkr.ecr.us-east-1.amazonaws.com/bsbingo-sandbox-backend
    newTag: latest
