name: Main Workflow

on: [ push, pull_request ]

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

jobs:
  check-lint-and-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
      - name: Check lint and formatting
        run: make check-lint-and-formatting

  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bsbingo
          POSTGRES_USER: bsbingo
          POSTGRES_PASSWORD: TESTPASSWORD
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432



    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.14"
      - name: Run backend tests
        run: CI=true make backend-test
        env:
          DATABASE_URL: postgresql://bsbingo:TESTPASSWORD@localhost:5432/bsbingo
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432


  build-backend-image:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [check-lint-and-formatting, backend-test]
    outputs:
      short-sha: ${{ steps.vars.outputs.short-sha }}
      branch-name: ${{ steps.vars.outputs.branch-name }}
      target-env: ${{ steps.vars.outputs.target-env }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/bsbingo-github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@5a88a04c91d5c6f97aae0d9be790e64d9b1d47b7 # v1

      - name: Set environment variables
        id: vars
        env:
          REF: ${{ github.ref }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH_NAME=$(echo "$REF" | sed s,refs/heads/,, | sed s,/,-,g)
          TARGET_ENV=$(if [ "$BRANCH_NAME" = "main" ]; then echo "prod"; else echo "sandbox"; fi)
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "branch-name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "target-env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"
          echo "TARGET_ENV=$TARGET_ENV" >> "$GITHUB_ENV"

      - name: Set Backend ECR Repo
        run: |
          echo "ECR_REPO_BACKEND=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/bsbingo-$TARGET_ENV-backend" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ECR_REPO_BACKEND }}:${{ env.SHORT_SHA }},${{ env.ECR_REPO_BACKEND }}:${{ env.BRANCH_NAME }}



  update-manifests:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    needs: [build-backend-image]


    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true # zizmor: ignore[artipacked] -- this job needs to push a commit below

      - name: Get environment variables from backend job
        env:
          SHORT_SHA: ${{ needs.build-backend-image.outputs.short-sha }}
          BRANCH_NAME: ${{ needs.build-backend-image.outputs.branch-name }}
          TARGET_ENV: ${{ needs.build-backend-image.outputs.target-env }}
        run: |
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"
          echo "TARGET_ENV=$TARGET_ENV" >> "$GITHUB_ENV"

      - name: Set ECR Repos
        run: |
          echo "ECR_REPO_BACKEND=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/bsbingo-$TARGET_ENV-backend" >> "$GITHUB_ENV"


      - name: Tag Images
        run: |
          cd k8s/$TARGET_ENV
          kustomize edit set image backend=$ECR_REPO_BACKEND:$SHORT_SHA


      - name: Commit & Push to GitHub
        run: |
          git config user.email "$GITHUB_EMAIL"
          git config user.name "GitHub User"
          git add k8s/$TARGET_ENV/kustomization.yaml
          git commit -m "Update $TARGET_ENV image to $SHORT_SHA [skip ci]"
          git push
