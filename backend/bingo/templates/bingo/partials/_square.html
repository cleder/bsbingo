<div id="square-{{ square.id }}"
     class="square{% if square.marked %} marked{% endif %}"
     hx-post="/board/{{ square.board_id }}/cell/{{ square.id }}/toggle/"
     hx-target="this"
     hx-swap="outerHTML">
    {% if square.buzzword %}{{ square.buzzword.text }}{% else %}FREE{% endif %}
</div>
