# Config for the lychee link checker (see .pre-commit-config.yaml).
# Excludes URLs that are never reachable from a CI/sandboxed environment:
# localhost/private addresses (dev-only example URLs in docs) and this
# project's own deployed environments (not guaranteed reachable from CI).
exclude = [
    "^https?://localhost",
    "^https?://127\\.0\\.0\\.1",
    "^https?://([a-zA-Z0-9-]+\\.)?bs-bingo\\.app",
]
